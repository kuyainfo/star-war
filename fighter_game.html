<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DOGFIGHT 5v5</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0a1a; font-family:Arial,sans-serif; touch-action:none; }
#lobby {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  width:100%; height:100%; color:#fff;
  background: radial-gradient(ellipse at center, #0d1b3e 0%, #0a0a1a 100%);
}
#lobby h1 { font-size:1.6em; letter-spacing:.2em; color:#7eb8ff; margin-bottom:8px; }
#lobby .sub { font-size:.85em; color:#aaa; margin-bottom:28px; }
#lobby input {
  background:#1a2a4a; border:1px solid #3a5a9a; color:#fff;
  padding:10px 18px; border-radius:8px; font-size:1em; width:220px;
  text-align:center; outline:none; margin-bottom:16px;
}
#lobby button {
  background:linear-gradient(135deg,#1e5fd4,#0d3a8a); color:#fff;
  border:none; border-radius:8px; padding:12px 36px; font-size:1em;
  cursor:pointer; letter-spacing:.1em;
}
#lobby .wait-msg { margin-top:20px; font-size:.85em; color:#7eb8ff; display:none; }
#lobby .team-badge { margin-top:12px; padding:6px 20px; border-radius:20px; font-size:.9em; font-weight:bold; display:none; }
.badge-A { background:#c0392b22; border:1px solid #e74c3c; color:#e74c3c; }
.badge-B { background:#1a6b2222; border:1px solid #2ecc71; color:#2ecc71; }
#game-wrap { display:none; width:100%; height:100%; position:relative; flex-direction:column; }
canvas#arena { display:block; width:100%; flex:1; }
#controls {
  display:none; position:absolute; bottom:0; left:0; right:0;
  height:130px; pointer-events:none; padding:0 16px 12px;
  align-items:flex-end; justify-content:space-between;
}
#joystick-area { width:110px; height:110px; pointer-events:all; position:relative; }
#joystick-base {
  width:110px; height:110px; border-radius:50%;
  background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.18);
  position:absolute; top:0; left:0;
}
#joystick-knob {
  width:44px; height:44px; border-radius:50%;
  background:radial-gradient(circle, rgba(126,184,255,0.7), rgba(30,95,212,0.5));
  border:2px solid rgba(126,184,255,0.8);
  position:absolute; top:33px; left:33px;
}
#fire-btn {
  width:80px; height:80px; border-radius:50%; pointer-events:all;
  background:radial-gradient(circle, #e74c3c, #8b0000);
  border:3px solid #ff6b6b; box-shadow:0 0 18px rgba(231,76,60,0.6);
  font-size:.75em; color:#fff; font-weight:bold;
  display:flex; align-items:center; justify-content:center;
  user-select:none; -webkit-user-select:none; margin-bottom:15px;
}
#fire-btn.active { background:radial-gradient(circle,#ff8a80,#e74c3c); box-shadow:0 0 30px rgba(255,100,80,0.9); }
#fire-btn.locked { background:radial-gradient(circle,#555,#333); border-color:#666; box-shadow:none; }
#hud {
  position:absolute; top:0; left:0; right:0; height:36px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; background:rgba(0,0,0,0.5); pointer-events:none; color:#fff;
}
.score-A { color:#e74c3c; font-weight:bold; font-size:.85em; }
.score-B { color:#2ecc71; font-weight:bold; font-size:.85em; }
.vs-txt { color:#555; font-size:.75em; }
#center-line {
  position:absolute; top:36px; bottom:130px; left:50%;
  width:1px; background:rgba(100,150,255,0.25); pointer-events:none;
}
#countdown-overlay {
  display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:3.5em; font-weight:bold; color:#ffd700;
  text-shadow:0 0 30px rgba(255,215,0,0.8); pointer-events:none; letter-spacing:.1em;
}
#result-overlay {
  display:none; position:absolute; inset:0; background:rgba(0,0,0,0.75);
  align-items:center; justify-content:center; flex-direction:column; color:#fff;
}
.result-title { font-size:2.5em; font-weight:bold; letter-spacing:.2em; margin-bottom:10px; }
.result-sub { font-size:1em; color:#aaa; }
</style>
</head>
<body>

<div id="lobby">
  <h1>&#9992; DOGFIGHT 5v5</h1>
  <div class="sub">Enter callsign to join battle</div>
  <input id="name-input" type="text" maxlength="8" placeholder="Callsign (max 8)">
  <button id="join-btn">JOIN</button>
  <div class="wait-msg" id="wait-msg">Waiting for host to start...</div>
  <div class="team-badge" id="team-badge"></div>
</div>

<div id="game-wrap">
  <div id="hud">
    <div class="score-A">&#128308; A : <span id="alive-A">5</span></div>
    <div class="vs-txt">VS</div>
    <div class="score-B"><span id="alive-B">5</span> : B &#128994;</div>
  </div>
  <div id="center-line"></div>
  <canvas id="arena"></canvas>
  <div id="countdown-overlay" id="countdown-overlay"></div>
  <div id="controls">
    <div id="joystick-area">
      <div id="joystick-base"></div>
      <div id="joystick-knob"></div>
    </div>
    <div id="fire-btn" id="fire-btn">FIRE</div>
  </div>
  <div id="result-overlay">
    <div class="result-title" id="result-title"></div>
    <div class="result-sub">GAME OVER</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, push }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl_NqANwk_lsfEL5kOyC1RJi29DLvGPU8",
  authDomain: "kuya-candy-game.firebaseapp.com",
  databaseURL: "https://kuya-candy-game-default-rtdb.firebaseio.com",
  projectId: "kuya-candy-game",
  storageBucket: "kuya-candy-game.firebasestorage.app",
  messagingSenderId: "105923267148",
  appId: "1:105923267148:web:1f0e0db9de8cc2876c42e9"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const ROOM = "fighter_room_1";

const lobbyEl       = document.getElementById("lobby");
const gameWrap      = document.getElementById("game-wrap");
const nameInput     = document.getElementById("name-input");
const joinBtn       = document.getElementById("join-btn");
const waitMsg       = document.getElementById("wait-msg");
const teamBadge     = document.getElementById("team-badge");
const canvas        = document.getElementById("arena");
const ctx           = canvas.getContext("2d");
const controls      = document.getElementById("controls");
const joystickArea  = document.getElementById("joystick-area");
const joystickKnob  = document.getElementById("joystick-knob");
const fireBtn       = document.getElementById("fire-btn");
const aliveAEl      = document.getElementById("alive-A");
const aliveBEl      = document.getElementById("alive-B");
const countdownEl   = document.getElementById("countdown-overlay");
const resultOverlay = document.getElementById("result-overlay");
const resultTitle   = document.getElementById("result-title");

let myId=null, myTeam=null, myName="";
let gameRunning=false, players={}, bullets={};
let gameStatus="waiting", winner=null;
let joyActive=false, joyDx=0, joyDy=0;
let myX=0, myY=0, myAlive=true, myHp=3;
let lastFire=0, isFiring=false;
let fireLocked=true;   // 5-sec grace period
let gameStartTime=0;
const JOY_R=55, FIRE_CD=400, MOVE_SPEED=6, GRACE=5000;

function resizeCanvas(){ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; }
window.addEventListener("resize", resizeCanvas);

joinBtn.addEventListener("click", async () => {
  const name = nameInput.value.trim();
  if(!name){ nameInput.focus(); return; }
  myName = name;
  const snap = await get(ref(db, ROOM+"/players"));
  const ex = snap.val()||{};
  let cA=0,cB=0;
  Object.values(ex).forEach(p=>{ if(p.team==="A") cA++; else cB++; });
  let team;
  if(cA>=5&&cB<5) team="B";
  else if(cB>=5&&cA<5) team="A";
  else team=Math.random()<0.5?"A":"B";
  myTeam=team;

  // spawn: y within 20%-80% of arena height
  const W=window.innerWidth, H=window.innerHeight-36-130;
  const yMin=H*0.2, yMax=H*0.8;
  myX = team==="A" ? 60+Math.random()*(W*0.35) : W*0.55+Math.random()*(W*0.35);
  myY = yMin + Math.random()*(yMax-yMin);

  const pRef=push(ref(db,ROOM+"/players"));
  myId=pRef.key;
  await set(pRef,{name,team,x:myX,y:myY,alive:true,hp:3});

  joinBtn.style.display="none"; nameInput.style.display="none";
  waitMsg.style.display="block"; teamBadge.style.display="block";
  teamBadge.textContent="Team "+team;
  teamBadge.className="team-badge badge-"+team;

  onValue(ref(db,ROOM+"/status"), snap=>{
    const s=snap.val();
    if(s==="playing"&&gameStatus!=="playing"){ gameStatus="playing"; startGame(); }
    else if(s==="ended"){ gameStatus="ended"; }
  });
});

function startGame(){
  lobbyEl.style.display="none";
  gameWrap.style.display="flex";
  controls.style.display="flex";
  resizeCanvas();
  gameStartTime = Date.now();
  fireLocked = true;
  fireBtn.classList.add("locked");
  countdownEl.style.display="block";

  onValue(ref(db,ROOM+"/players"), snap=>{ players=snap.val()||{}; updateHUD(); checkWin(); });
  onValue(ref(db,ROOM+"/bullets"), snap=>{ bullets=snap.val()||{}; });
  onValue(ref(db,ROOM+"/winner"), snap=>{ winner=snap.val(); if(winner) showResult(winner); });

  gameRunning=true;
  requestAnimationFrame(loop);
  setInterval(pushMyPos,50);
  setInterval(tickBullets,30);
}

function updateHUD(){
  let a=0,b=0;
  Object.values(players).forEach(p=>{ if(p.alive){ if(p.team==="A") a++; else b++; } });
  aliveAEl.textContent=a; aliveBEl.textContent=b;
}
function checkWin(){
  if(gameStatus!=="playing") return;
  let a=0,b=0;
  Object.values(players).forEach(p=>{ if(p.alive){ if(p.team==="A") a++; else b++; } });
  if(a===0&&b===0) return;
  if(a===0) doWin("B"); else if(b===0) doWin("A");
}
function doWin(team){ if(winner) return; update(ref(db,ROOM),{status:"ended",winner:team}); }
function showResult(team){
  gameRunning=false;
  resultTitle.textContent = team===myTeam ? "VICTORY!" : "DEFEATED";
  resultTitle.style.color = team==="A" ? "#e74c3c" : "#2ecc71";
  resultOverlay.style.display="flex";
}

function pushMyPos(){
  if(!myId||!myAlive) return;
  const W=canvas.width, H=canvas.height, hw=W/2;
  let nx=myX+joyDx*MOVE_SPEED, ny=myY+joyDy*MOVE_SPEED;
  const minX=myTeam==="A"?20:hw+4, maxX=myTeam==="A"?hw-4:W-20;
  nx=Math.max(minX,Math.min(maxX,nx));
  ny=Math.max(40,Math.min(H-40,ny));
  myX=nx; myY=ny;
  update(ref(db,ROOM+"/players/"+myId),{x:nx,y:ny});
}

function tryFire(){
  if(fireLocked) return;
  const now=Date.now();
  if(now-lastFire<FIRE_CD||!myAlive) return;
  lastFire=now;
  const bRef=push(ref(db,ROOM+"/bullets"));
  set(bRef,{x:myX,y:myY,vx:myTeam==="A"?10:-10,team:myTeam,ownerId:myId,born:now});
}

function tickBullets(){
  if(!myId||!gameRunning) return;
  const W=canvas.width, toRemove=[], updates={};
  Object.entries(bullets).forEach(([bid,b])=>{
    if(b.ownerId!==myId) return;
    const nx=(b.x||0)+(b.vx||0);
    if(nx<0||nx>W||Date.now()-b.born>3000){ toRemove.push(bid); return; }
    let hit=false;
    Object.entries(players).forEach(([pid,p])=>{
      if(!p.alive||p.team===myTeam) return;
      if(Math.abs(nx-p.x)<24&&Math.abs((b.y||0)-p.y)<20){
        hit=true;
        const newHp=(p.hp||1)-1;
        if(newHp<=0){
          update(ref(db,ROOM+"/players/"+pid),{alive:false,hp:0});
        } else {
          update(ref(db,ROOM+"/players/"+pid),{hp:newHp});
        }
        toRemove.push(bid);
      }
    });
    if(!hit) updates[bid]=Object.assign({},b,{x:nx});
  });
  toRemove.forEach(bid=>remove(ref(db,ROOM+"/bullets/"+bid)));
  Object.entries(updates).forEach(([bid,bd])=>update(ref(db,ROOM+"/bullets/"+bid),bd));
}

const stars=Array.from({length:80},()=>({x:Math.random()*2000,y:Math.random()*1200,r:Math.random()*1.5+0.3,a:Math.random()*0.6+0.2}));

function loop(){
  if(!gameRunning) return;
  const W=canvas.width, H=canvas.height;

  // grace period check
  const elapsed=Date.now()-gameStartTime;
  if(fireLocked && elapsed>=GRACE){
    fireLocked=false;
    fireBtn.classList.remove("locked");
    countdownEl.style.display="none";
  }
  if(fireLocked){
    const remaining=Math.ceil((GRACE-elapsed)/1000);
    countdownEl.textContent="READY... "+remaining;
  }

  ctx.fillStyle="#05050f"; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2); ctx.fillStyle="rgba(255,255,255,"+s.a+")"; ctx.fill(); });
  ctx.strokeStyle="rgba(100,150,255,0.25)"; ctx.setLineDash([6,8]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke(); ctx.setLineDash([]);

  Object.entries(players).forEach(([pid,p])=>{
    if(!p.alive) return;
    drawFighter(p.x,p.y,p.team==="A"?"#e74c3c":"#2ecc71",p.team==="B",pid===myId,p.name,p.hp||3);
  });

  // draw bullets as rectangles
  Object.values(bullets).forEach(b=>{
    const col=b.team==="A"?"#ff8a80":"#80ff9e";
    ctx.save();
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillRect(b.x-12,b.y-3,24,6);
    ctx.shadowBlur=0; ctx.restore();
  });

  if(players[myId]&&!players[myId].alive&&myAlive) myAlive=false;
  requestAnimationFrame(loop);
}

function drawFighter(x,y,color,flipped,isMe,name,hp){
  ctx.save(); ctx.translate(x,y); if(flipped) ctx.scale(-1,1);
  ctx.shadowColor=color; ctx.shadowBlur=isMe?18:8; ctx.fillStyle=color;
  ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-14,-5); ctx.lineTo(-18,0); ctx.lineTo(-14,5); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-18); ctx.lineTo(-16,-14); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,18); ctx.lineTo(-16,14); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-14,-3); ctx.lineTo(-22,-10); ctx.lineTo(-20,-3); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-14,3); ctx.lineTo(-22,10); ctx.lineTo(-20,3); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();

  // arrow above (isMe)
  if(isMe){
    ctx.save(); ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.moveTo(x,y-34); ctx.lineTo(x-7,y-46); ctx.lineTo(x+7,y-46); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }

  // HP hearts above fighter
  ctx.save();
  const hearts=hp||0;
  const heartStr = hearts===3?"♥ ♥ ♥": hearts===2?"♥ ♥  ": hearts===1?"♥    ":"     ";
  ctx.font="13px Arial"; ctx.fillStyle=color; ctx.textAlign="center";
  ctx.fillText(heartStr, x, y-52);
  ctx.restore();

  // name
  ctx.save(); ctx.font="11px Arial"; ctx.fillStyle="rgba(255,255,255,0.7)";
  ctx.textAlign="center"; ctx.fillText(name||"",x,y+32); ctx.restore();
}

joystickArea.addEventListener("touchstart",e=>{ e.preventDefault(); joyActive=true; },{passive:false});
joystickArea.addEventListener("touchmove",e=>{
  e.preventDefault(); if(!joyActive) return;
  const t=e.touches[0], r=joystickArea.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  let dx=t.clientX-cx, dy=t.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>JOY_R){ dx=dx/dist*JOY_R; dy=dy/dist*JOY_R; }
  joystickKnob.style.transform="translate("+dx+"px,"+dy+"px)";
  joyDx=dx/JOY_R; joyDy=dy/JOY_R;
},{passive:false});
joystickArea.addEventListener("touchend",e=>{ e.preventDefault(); joyActive=false; joyDx=0; joyDy=0; joystickKnob.style.transform=""; },{passive:false});

let mj=false;
joystickArea.addEventListener("mousedown",()=>mj=true);
document.addEventListener("mousemove",e=>{
  if(!mj) return;
  const r=joystickArea.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  let dx=e.clientX-cx, dy=e.clientY-cy;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>JOY_R){ dx=dx/dist*JOY_R; dy=dy/dist*JOY_R; }
  joystickKnob.style.transform="translate("+dx+"px,"+dy+"px)";
  joyDx=dx/JOY_R; joyDy=dy/JOY_R;
});
document.addEventListener("mouseup",()=>{ if(!mj) return; mj=false; joyDx=0; joyDy=0; joystickKnob.style.transform=""; });

fireBtn.addEventListener("touchstart",e=>{ e.preventDefault(); if(fireLocked) return; fireBtn.classList.add("active"); isFiring=true; tryFire(); },{passive:false});
fireBtn.addEventListener("touchend",e=>{ e.preventDefault(); fireBtn.classList.remove("active"); isFiring=false; },{passive:false});
fireBtn.addEventListener("mousedown",()=>{ if(fireLocked) return; isFiring=true; fireBtn.classList.add("active"); tryFire(); });
document.addEventListener("mouseup",()=>{ isFiring=false; fireBtn.classList.remove("active"); });
setInterval(()=>{ if(isFiring&&!fireLocked) tryFire(); },FIRE_CD);
</script>
</body>
</html>
