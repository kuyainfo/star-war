<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOGFIGHT 5v5 - Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#05050f; color:#fff; font-family:Arial,sans-serif; overflow:hidden; }
#top-bar {
  height:52px; background:rgba(0,0,0,0.6);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; border-bottom:1px solid rgba(100,150,255,0.2);
}
#top-bar h1 { font-size:1em; letter-spacing:.15em; color:#7eb8ff; }
.btn-start { background:linear-gradient(135deg,#27ae60,#1a6b22); border:none; color:#fff; padding:8px 28px; border-radius:6px; font-size:.9em; cursor:pointer; letter-spacing:.1em; }
.btn-reset { background:rgba(200,80,60,0.2); border:1px solid #c0392b; color:#e74c3c; padding:8px 18px; border-radius:6px; font-size:.85em; cursor:pointer; margin-left:10px; }
.status-badge { font-size:.8em; padding:4px 12px; border-radius:12px; }
.s-waiting { background:#1a2a1a; color:#2ecc71; border:1px solid #27ae60; }
.s-playing { background:#1a1a2a; color:#7eb8ff; border:1px solid #3a6adf; }
.s-ended   { background:#2a1a1a; color:#e74c3c; border:1px solid #c0392b; }
#main { display:flex; height:calc(100% - 52px); overflow:hidden; }
#arena-wrap { flex:1; position:relative; min-width:0; overflow:hidden; }
canvas#arena { width:100%; height:100%; display:block; position:absolute; top:0; left:0; }
#side { width:220px; background:rgba(0,0,0,0.5); border-left:1px solid rgba(100,150,255,0.15); display:flex; flex-direction:column; padding:12px 10px; gap:14px; overflow-y:auto; }
.panel-title { font-size:.7em; letter-spacing:.15em; color:#555; text-transform:uppercase; margin-bottom:6px; }
.score-row { display:flex; justify-content:space-between; align-items:center; }
.score-num { font-size:2em; font-weight:bold; }
.score-A-row .score-num { color:#e74c3c; }
.score-B-row .score-num { color:#2ecc71; }
.score-label { font-size:.75em; color:#888; }
.player-list { display:flex; flex-direction:column; gap:4px; }
.player-row { display:flex; align-items:center; gap:6px; padding:5px 8px; border-radius:5px; font-size:.8em; background:rgba(255,255,255,0.04); }
.player-row.dead { opacity:.35; text-decoration:line-through; }
.dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.dot-A { background:#e74c3c; }
.dot-B { background:#2ecc71; }
.player-name { flex:1; }
.player-hp { font-size:.75em; color:#ffd700; }
#winner-banner { display:none; position:absolute; inset:0; background:rgba(0,0,0,0.72); align-items:center; justify-content:center; flex-direction:column; }
.win-title { font-size:3em; font-weight:bold; letter-spacing:.2em; }
.win-sub { font-size:1em; color:#aaa; margin-top:8px; }
</style>
</head>
<body>
<div id="top-bar">
  <h1>&#9992; 轟炸大作戰 後台</h1>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="status-badge s-waiting" id="status-badge">Waiting</span>
    <button class="btn-start" id="btn-start">&#9654; START</button>
    <button class="btn-reset" id="btn-reset">RESET</button>
  </div>
</div>
<div id="main">
  <div id="arena-wrap">
    <canvas id="arena"></canvas>
    <div id="winner-banner">
      <div class="win-title" id="win-title"></div>
      <div class="win-sub">GAME OVER</div>
    </div>
  </div>
  <div id="side">
    <div>
      <div class="panel-title">Alive</div>
      <div class="score-row score-A-row">
        <span class="score-label">&#128308; Team A</span>
        <span class="score-num" id="alive-A">-</span>
      </div>
      <div class="score-row score-B-row" style="margin-top:6px;">
        <span class="score-label">&#128994; Team B</span>
        <span class="score-num" id="alive-B">-</span>
      </div>
    </div>
    <div>
      <div class="panel-title">Players</div>
      <div class="player-list" id="player-list"></div>
    </div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl_NqANwk_lsfEL5kOyC1RJi29DLvGPU8",
  authDomain: "kuya-candy-game.firebaseapp.com",
  databaseURL: "https://kuya-candy-game-default-rtdb.firebaseio.com",
  projectId: "kuya-candy-game",
  storageBucket: "kuya-candy-game.firebasestorage.app",
  messagingSenderId: "105923267148",
  appId: "1:105923267148:web:1f0e0db9de8cc2876c42e9"
};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const ROOM="fighter_room_1";

const canvas=document.getElementById("arena");
const ctx=canvas.getContext("2d");
const aliveAEl=document.getElementById("alive-A");
const aliveBEl=document.getElementById("alive-B");
const playerListEl=document.getElementById("player-list");
const statusBadge=document.getElementById("status-badge");
const winnerBanner=document.getElementById("winner-banner");
const winTitle=document.getElementById("win-title");

let players={}, bullets={}, gameStatus="waiting";
let clientW=390, clientH=700; // default mobile size, updated from Firebase meta

function scaleX(x){ return x * (canvas.width / clientW); }
function scaleY(y){ return y * (canvas.height / clientH); }

function resizeCanvas(){
  const wrap=document.getElementById("arena-wrap");
  const w=wrap.clientWidth, h=wrap.clientHeight;
  if(w>0&&h>0){ canvas.width=w; canvas.height=h; }
}
window.addEventListener("resize",resizeCanvas);
// retry until arena-wrap has real dimensions
const resizeTimer=setInterval(()=>{ resizeCanvas(); if(canvas.width>100) clearInterval(resizeTimer); },100);

onValue(ref(db,ROOM+"/players"),snap=>{ players=snap.val()||{}; updateSide(); });
onValue(ref(db,ROOM+"/meta"),snap=>{ const m=snap.val(); if(m){ clientW=m.clientW||390; clientH=m.clientH||700; } });
onValue(ref(db,ROOM+"/bullets"),snap=>{ bullets=snap.val()||{}; });
onValue(ref(db,ROOM+"/status"),snap=>{ gameStatus=snap.val()||"waiting"; updateBadge(); });
onValue(ref(db,ROOM+"/winner"),snap=>{
  const w=snap.val();
  if(w){
    winTitle.textContent=(w==="A"?"Team A":"Team B")+" WINS!";
    winTitle.style.color=w==="A"?"#e74c3c":"#2ecc71";
    winnerBanner.style.display="flex";
  }
});

function updateBadge(){
  statusBadge.className="status-badge";
  if(gameStatus==="waiting"){ statusBadge.textContent="Waiting"; statusBadge.classList.add("s-waiting"); }
  else if(gameStatus==="playing"){ statusBadge.textContent="LIVE"; statusBadge.classList.add("s-playing"); }
  else { statusBadge.textContent="Ended"; statusBadge.classList.add("s-ended"); }
}
function hpStr(hp){ return "♥".repeat(Math.max(0,hp||0)); }
function updateSide(){
  let a=0,b=0;
  const rows=[];
  Object.values(players).forEach(p=>{ if(p.alive){ if(p.team==="A") a++; else b++; } rows.push(p); });
  aliveAEl.textContent=a; aliveBEl.textContent=b;
  playerListEl.innerHTML=rows.map(p=>{
    const hp=p.alive?(p.hp||3):0;
    return "<div class=\"player-row"+(p.alive?"":" dead")+"\"><div class=\"dot dot-"+p.team+"\"></div><div class=\"player-name\">"+p.name+"</div><div class=\"player-hp\">"+hpStr(hp)+"</div></div>";
  }).join("");
}

document.getElementById("btn-start").addEventListener("click",()=>{ update(ref(db,ROOM),{status:"playing",winner:null}); });
document.getElementById("btn-reset").addEventListener("click",async()=>{
  if(!confirm("Reset this game? All player data will be cleared.")) return;
  await remove(ref(db,ROOM));
  winnerBanner.style.display="none"; players={}; bullets={}; updateSide();
});

const stars=Array.from({length:80},()=>({x:Math.random()*3000,y:Math.random()*2000,r:Math.random()*1.5+0.3,a:Math.random()*0.5+0.2}));

function loop(){
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle="#05050f"; ctx.fillRect(0,0,W,H);
  stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2); ctx.fillStyle="rgba(255,255,255,"+s.a+")"; ctx.fill(); });
  ctx.strokeStyle="rgba(100,150,255,0.2)"; ctx.setLineDash([6,8]); ctx.lineWidth=1;
  const cx=scaleX(clientW/2);
  ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke(); ctx.setLineDash([]);

  Object.values(players).forEach(p=>{
    if(!p.alive) return;
    const col=p.team==="A"?"#e74c3c":"#2ecc71";
    const sx=scaleX(p.x), sy=scaleY(p.y);
    // fighter
    ctx.save(); ctx.translate(sx,sy); if(p.team==="B") ctx.scale(-1,1);
    ctx.shadowColor=col; ctx.shadowBlur=8; ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-14,-5); ctx.lineTo(-18,0); ctx.lineTo(-14,5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,-18); ctx.lineTo(-16,-14); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-10,18); ctx.lineTo(-16,14); ctx.lineTo(-8,0); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-14,-3); ctx.lineTo(-22,-10); ctx.lineTo(-20,-3); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-14,3); ctx.lineTo(-22,10); ctx.lineTo(-20,3); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
    // HP
    ctx.save(); ctx.font="13px Arial"; ctx.fillStyle=col; ctx.textAlign="center";
    ctx.fillText(hpStr(p.hp||3),sx,sy-38); ctx.restore();
    // name
    ctx.save(); ctx.font="11px Arial"; ctx.fillStyle="rgba(255,255,255,0.7)"; ctx.textAlign="center";
    ctx.fillText(p.name||"",sx,sy+32); ctx.restore();
  });

  // bullets as rectangles (scaled)
  Object.values(bullets).forEach(b=>{
    const col=b.team==="A"?"#ff8a80":"#80ff9e";
    const bx=scaleX(b.x), by=scaleY(b.y);
    ctx.save(); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.fillRect(bx-12,by-3,24,6);
    ctx.shadowBlur=0; ctx.restore();
  });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
